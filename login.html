<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/1f679355a0.js" crossorigin="anonymous"></script>

    <style>

        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: whitesmoke;
        }

        div.container{
            background-color: white;
            width: 400px;
            height: 300px;
            border-radius: 10px;
            box-shadow: 1px 1px 8px  rgba(0, 0, 0, 0.419);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        header{
            text-align: center;
            background-image: linear-gradient(rgb(1, 104, 1),rgb(2, 241, 2) );
            border-radius: 5px;
        }

        header>h1{
            color: white;
            text-shadow: 1px 1px 1px white;
        }

        header>p{
            color: white;
            padding: 5px;
        }

        .login{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px;
            margin-top: 20px;
        }

        input{
            border: none;
            border-radius: 5px;
            padding: 10px;
            width: 90%;
            cursor: pointer;
            background-color: whitesmoke;
        }

        i{
            color: darkgray;
        }

        button{
            border: none;
            border-radius: 10px;
            padding: 10px;
            width: 100px;
            background-color:rgb(2, 168, 2) ;
            color: white;
            cursor: pointer;
            transition: background-color 0.5s, border-radius 0.5s;
        }

        button:hover{
            background-color: green;
            border-radius: 12px;
        }

        footer>a{
            text-decoration: none;
            padding-top: 10px;
            margin-left: 33%;
            font-size: 0.9em;
            color: darkgray;
            transition: font-weigth 0.5s;
        }

        a:hover{
            color: grey;
            font-weight: bold;
        }
    </style>

    <title>Faça seu login</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>MeuApp</h1>
            <p>faça seu login e venha fazer parte da nossa familia. </p>
        </header>

        <label class="login">
            <span><i class="fa-solid fa-user"></i><input  type="email" name="email" id="iemail" placeholder="email" autocomplete="additional-name" required></span>
            <span>  <i class="fa-solid fa-lock"></i><input type="password" name="senha" id="isenha" placeholder="senha" required></span>
            <button>Entrar</button>
        </label>
        
        <footer>
            <a href="#" target="_blank">esqueci minha senha</a>
        </footer>
    </div>
</body>
</html>
